services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: sohaara-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sohaara_lms
      POSTGRES_USER: sohaara
      POSTGRES_PASSWORD: sohaara
    volumes:
      - .docker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sohaara -d sohaara_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: sohaara-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - .docker/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Meilisearch ───
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: sohaara-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: sohaara-master-key
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    volumes:
      - .docker/meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO ───
  minio:
    image: minio/minio:latest
    container_name: sohaara-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: sohaara
      MINIO_ROOT_PASSWORD: sohaara-secret-key
    command: server /data --console-address ":9001"
    volumes:
      - .docker/minio:/data
    healthcheck:
      # `mc ready local` returns 0 once the server is accepting requests.
      # mc is shipped in the minio image.
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO init (one-shot) ───
  # MinIO does not auto-create buckets on write, so the first upload would
  # 404. This service waits for MinIO to be healthy, runs `mc mb --ignore-existing`
  # against the bucket the API expects, then exits. Idempotent on re-runs.
  #
  # The init logic lives in .docker/minio-init.sh. We bind-mount it into the
  # minio/mc image (which already ships `mc`) and exec it directly — compose's
  # own `command:` parser splits multi-statement shell strings on `&&`, so an
  # inlined `mc alias set ... && mc mb ... && echo ...` would get truncated.
  minio-init:
    image: minio/mc:latest
    container_name: sohaara-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - default
    environment:
      MINIO_ROOT_USER: sohaara
      MINIO_ROOT_PASSWORD: sohaara-secret-key
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: sohaara-lms
      MINIO_USE_SSL: "false"
    volumes:
      - ./.docker/minio-init.sh:/minio-init.sh:ro
    command: ["/bin/sh", "/minio-init.sh"]
    restart: "no"

  # ─── API ───
  # The api image's entrypoint runs `prisma migrate deploy` + `tsx src/seed.ts`
  # before exec'ing the nest server. Both are idempotent — on restarts after
  # the first boot they no-op, so we don't need a separate one-shot bootstrap
  # service.
  api:
    build:
      context: .
      dockerfile: .docker/api.Dockerfile
    container_name: sohaara-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://sohaara:sohaara@postgres:5432/sohaara_lms?schema=public
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: sohaara-master-key
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: sohaara
      MINIO_SECRET_KEY: sohaara-secret-key
      MINIO_BUCKET: sohaara-lms
      MINIO_USE_SSL: "false"
      JWT_SECRET: dev-jwt-secret-do-not-use-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_ISSUER: sohaara-lms
      APP_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001
      API_URL: http://localhost:4000
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    # Hot-reload source only — DO NOT bind-mount the whole /app. The host's
    # node_modules is owned by a different UID and would shadow the image's
    # chown'd node_modules, breaking prisma generate and any other
    # runtime writes to node_modules.
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/test:/app/apps/api/test
      - ./packages:/app/packages
      - api_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Web App ───
  web:
    build:
      context: .
      dockerfile: .docker/web.Dockerfile
    container_name: sohaara-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
    # No source bind-mounts: the image ships a `output: 'standalone'` Next.js
    # server with everything bundled. Mounting the host source would shadow
    # that bundle and the page would never hydrate past its loading shell.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Admin Panel ───
  admin:
    build:
      context: .
      dockerfile: .docker/admin.Dockerfile
    container_name: sohaara-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    # No source bind-mounts: see note under the `web` service above.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/admin/login >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  # Named volume so docker preserves the image's chown'd node_modules
  # across `docker compose up` (anonymous volumes were not being preserved).
  api_node_modules:

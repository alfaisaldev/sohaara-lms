# Runs the Sohaara LMS against the local AWS emulator at
# E:\AI\Testing\aws-emulator\. All three apps join `emu-net` (an external
# network created by the emulator's own compose) and reach Postgres / Redis /
# MinIO / Meilisearch / Mailhog / Keycloak by container name. No data is
# stored in this compose — emulator owns all state.
#
# Network `emu-net` must exist (it does if `docker compose ps` in the emulator
# folder shows its services as Up). To create it manually if you ever wipe it:
#   docker network create emu-net
#
# Start order:
#   1. (in aws-emulator/) docker compose up -d
#   2. (here)              docker compose up -d --build

services:
  # ─── API ───
  # The api image's entrypoint runs `prisma migrate deploy` + `tsx src/seed.ts`
  # before exec'ing the nest server. Both are idempotent — on restarts after
  # the first boot they no-op, so we don't need a separate one-shot bootstrap
  # service.
  api:
    build:
      context: .
      dockerfile: .docker/api.Dockerfile
    container_name: sohaara-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      # Emulator Postgres — container name `emu-postgres` on the emu-net network.
      DATABASE_URL: postgresql://sohaara:sohaara_dev_password@emu-postgres:5432/sohaara_lms?schema=public
      POSTGRES_HOST: emu-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: sohaara
      POSTGRES_PASSWORD: sohaara_dev_password
      POSTGRES_DB: sohaara_lms
      # Emulator Redis (no password).
      REDIS_URL: redis://emu-redis:6379
      # Emulator Meilisearch (master key from emulator .env).
      MEILISEARCH_URL: http://emu-meilisearch:7700
      MEILISEARCH_KEY: sohaara_dev_master_key
      # Emulator MinIO (S3). The api has three buckets it writes to:
      #   sohaara-uploads       — Media Library, avatars
      #   sohaara-scorm         — extracted SCORM package contents
      #   sohaara-certificates  — certificate template images and logos
      # MINIO_BUCKET is kept for back-compat (defaults to the uploads one).
      MINIO_ENDPOINT: emu-minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: sohaara
      MINIO_SECRET_KEY: sohaara_dev_password
      MINIO_BUCKET: sohaara-uploads
      MINIO_BUCKET_UPLOADS: sohaara-uploads
      MINIO_BUCKET_SCORM: sohaara-scorm
      MINIO_BUCKET_CERTIFICATES: sohaara-certificates
      MINIO_BUCKET_MEDIA: sohaara-media
      MINIO_USE_SSL: "false"
      STORAGE_PROVIDER: minio
      # Public URL prefix used when building browser-facing URLs for stored
      # objects. The api's GET /uploads/* route streams the bytes back, so
      # this is just `${API_URL}/uploads` (same host as the api).
      STORAGE_PUBLIC_URL: http://localhost:4000/uploads
      # Emulator Keycloak (OIDC). Used for OIDC verification (JWKS),
      # the Admin REST API bootstrap (KeycloakAdminService), and the
      # `/auth/keycloak/exchange` token-verification path. Public-URL
      # form is the host port-forward — that's the `iss` a browser
      # will mint against. `KEYCLOAK_ADMIN_USERNAME` /
      # `KEYCLOAK_ADMIN_PASSWORD` are the bootstrap credentials for
      # the realm's built-in `admin-cli` service account; they live
      # in the api container env, not in the browser bundle.
      KEYCLOAK_URL: http://emu-keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:8080
      KEYCLOAK_REALM: sohaara
      KEYCLOAK_CLIENT_ID: sohaara-api
      # Service-account client used for Admin REST API calls. See
      # `KeycloakAdminService` — the bootstrap flow uses
      # `client_credentials` against this client. The secret must
      # match `aws-emulator/keycloak/realms/sohaara.json`. Server-only
      # (NEVER prefix with NEXT_PUBLIC_, must not reach the browser).
      KEYCLOAK_ADMIN_CLIENT_ID: sohaara-admin-bootstrap
      KEYCLOAK_ADMIN_CLIENT_SECRET: sohaara-admin-bootstrap-secret-change-me
      # Legacy username/password env vars kept for back-compat with
      # the previous `admin-cli` + password-grant bootstrap. Not used
      # by the current `client_credentials` flow but the getters in
      # `ConfigService` still read them for any code path that falls
      # back to the old behaviour.
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      AUTH_PROVIDER: local
      # Emulator Mailhog (SMTP receive-only).
      SMTP_HOST: emu-mailhog
      SMTP_PORT: 1025
      # JWT.
      JWT_SECRET: dev-jwt-secret-do-not-use-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_ISSUER: sohaara-lms
      # Public URLs the LMS exposes to clients.
      APP_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001
      API_URL: http://localhost:4000
    networks:
      - emu-net
    # Hot-reload source only — DO NOT bind-mount the whole /app. The host's
    # node_modules is owned by a different UID and would shadow the image's
    # chown'd node_modules, breaking prisma generate and any other
    # runtime writes to node_modules.
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/test:/app/apps/api/test
      - ./packages:/app/packages
      - api_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Web App ───
  web:
    build:
      context: .
      dockerfile: .docker/web.Dockerfile
      args:
        # Browser-reachable origin (inlined into the client bundle and
        # used by next.config.ts CSP + middleware.ts). The browser hits
        # the api through the host port-forward at localhost:4000.
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        # Server-only origin used by next.config.ts rewrites to talk to
        # the api container by its docker service name.
        API_INTERNAL_URL: http://api:4000
        # Keycloak OIDC client config — inlined into the client bundle
        # by Next.js (NEXT_PUBLIC_*) and read by `apps/web/src/lib/oidc.ts`.
        # Use the host port-forward so the browser can reach Keycloak.
        NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
        NEXT_PUBLIC_KEYCLOAK_REALM: sohaara
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: sohaara-web
    container_name: sohaara-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Reach the api by its docker network name, not localhost — both
      # containers live on emu-net so the api container's hostname is `api`.
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - emu-net
    # No source bind-mounts: the image ships a `output: 'standalone'` Next.js
    # server with everything bundled. Mounting the host source would shadow
    # that bundle and the page would never hydrate past its loading shell.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Admin Panel ───
  admin:
    build:
      context: .
      dockerfile: .docker/admin.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_APP_URL: http://localhost:3001
        API_INTERNAL_URL: http://api:4000
        # Same Keycloak client config as the web app but with
        # `sohaara-admin` as the client_id (separate OIDC client in
        # the realm — separate redirect URIs, separate post-logout
        # landing at `/admin/auth/logged-out`).
        NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
        NEXT_PUBLIC_KEYCLOAK_REALM: sohaara
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: sohaara-admin
    container_name: sohaara-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    networks:
      - emu-net
    # No source bind-mounts: see note under the `web` service above.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  # Named volume so docker preserves the image's chown'd node_modules
  # across `docker compose up` (anonymous volumes were not being preserved).
  api_node_modules:

networks:
  # The emulator compose renames its default network to `emu-net` so external
  # compose files can attach to it. The emulator must already be running
  # before this compose is brought up.
  emu-net:
    external: true
    name: emu-net